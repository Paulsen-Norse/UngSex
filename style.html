<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Styleguide — UngSex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="icons.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--color-surface-1);
      color: var(--color-tone-3);
      font-family: 'Nunito', sans-serif;
    }

    .page {
      padding-top: 64px;
      padding-bottom: 96px;
    }

    @media (max-width: 809px) { .page { padding-top: 40px; padding-bottom: 64px; } }

    .page-header {
      margin-bottom: 64px;
    }

    .page-header h1 {
      font-size: var(--font-h1);
      line-height: var(--lh-h1);
      font-weight: 700;
      color: var(--color-tone-3);
    }

    .section {
      margin-bottom: 64px;
    }

    .section-title {
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--color-tone-1);
    }

    /* ── Colors ── */
    .color-swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    .color-swatches + .color-swatches {
      margin-top: 20px;
    }

    .swatch {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 124px;
    }

    .swatch-color {
      aspect-ratio: 1;
      width: 100%;
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,.08);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .swatch-copy-btn {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s;
    }

    .swatch:hover .swatch-copy-btn { opacity: 1; }


    /* ── Type ── */
    .type-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(5, auto);
      gap: 0 48px;
    }

    .type-grid > div {
      display: grid;
      grid-row: 1 / -1;
      grid-template-rows: subgrid;
    }

    .type-col-label {
      font-size: 13px;
      font-weight: 500;
      font-family: 'Nunito', sans-serif;
      color: var(--color-tone-3);
      padding-bottom: 8px;
    }

    .type-row {
      display: flex;
      flex-direction: column;
      padding: 16px 0;
      border-bottom: 1px solid var(--color-tone-1);
    }

    .type-sample { line-height: 1; }

    .type-meta {
      font-size: 12px;
      font-weight: 400;
      line-height: 1.4;
      margin-top: 6px;
      color: var(--color-tone-2);
      font-family: 'Nunito', sans-serif;
    }

    @media (max-width: 809px) {
      .type-grid { display: flex; flex-direction: column; gap: 32px; }
      .type-grid > div { display: block; }
    }

    /* ── Buttons ── */
    .btn-grid {
      display: grid;
      grid-template-columns: auto auto;
      gap: 16px;
      justify-content: start;
      justify-items: start;
      align-items: center;
    }

    /* ── Toast ── */
    #color-toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: var(--color-tone-3);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #fff;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      z-index: 500;
      white-space: nowrap;
    }

    #color-toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast-dot {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,.2);
      flex-shrink: 0;
    }

    /* ── Animations ── */
    .pg-anim {
      opacity: 0;
      translate: 0 24px;
      transition: opacity .8s cubic-bezier(.22,1,.36,1),
                  translate .8s cubic-bezier(.22,1,.36,1);
    }

    .pg-anim.is-visible { opacity: 1; translate: 0 0; }
    .section-title.pg-anim.is-visible { transition-delay: 0s; }
    .section-title + .pg-anim.is-visible { transition-delay: .2s; }
    .type-grid > div.pg-anim.is-visible { transition-delay: calc(.2s + var(--stagger-i, 0) * .15s); }
    .color-swatches .swatch.pg-anim.is-visible { transition-delay: calc(.3s + var(--stagger-i, 0) * .08s); }
    .btn-grid .btn.pg-anim.is-visible { transition-delay: calc(.3s + var(--stagger-i, 0) * .08s); }
  </style>
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav__surface">
      <div class="nav__bar">
        <a href="/" class="nav__logo">UngSex</a>
        <div class="nav__desktop">
          <a href="#" class="nav__link">Om oss</a>
          <a href="#" class="btn btn--sm">
            <hg-icon name="login-01" size="20"></hg-icon>
            Lærere
          </a>
        </div>
        <button class="nav__toggle" aria-label="Open menu" id="nav-toggle">
          <span class="nav__toggle-bar"></span>
          <span class="nav__toggle-bar"></span>
        </button>
      </div>
      <div class="nav__mobile-wrap">
        <div class="nav__mobile-menu" id="nav-mobile-menu">
          <a href="#" class="nav__link">Om oss</a>
          <a href="#" class="btn btn--sm">
            <hg-icon name="login-01" size="20"></hg-icon>
            Lærere
          </a>
        </div>
      </div>
    </div>
  </nav>

  <div class="page container">

    <div class="page-header">
      <h1>Style Guide</h1>
    </div>

    <!-- Colors -->
    <div class="section">
      <h3 class="section-title">Colors</h3>
      <div class="color-swatches">
        <div class="swatch" data-color="#7c3aed">
          <div class="swatch-color" style="background:#7c3aed"></div>
        </div>
        <div class="swatch" data-color="#5b21b5">
          <div class="swatch-color" style="background:#5b21b5"></div>
        </div>
      </div>
      <div class="color-swatches">
        <div class="swatch" data-color="#1a0a40">
          <div class="swatch-color" style="background:#1a0a40"></div>
        </div>
        <div class="swatch" data-color="#6c657c">
          <div class="swatch-color" style="background:#6c657c"></div>
        </div>
        <div class="swatch" data-color="#d7dde3">
          <div class="swatch-color" style="background:#d7dde3"></div>
        </div>
      </div>
      <div class="color-swatches">
        <div class="swatch" data-color="#cbfaf0">
          <div class="swatch-color" style="background:#cbfaf0"></div>
        </div>
        <div class="swatch" data-color="#f1fbf9">
          <div class="swatch-color" style="background:#f1fbf9"></div>
        </div>
      </div>
    </div>

    <!-- Type -->
    <div class="section">
      <h3 class="section-title">Type</h3>
      <div class="type-grid">

        <div>
          <div class="type-col-label">≥ 810px</div>
          <div class="type-row">
            <div class="type-sample" style="font-size:68px;font-weight:700;line-height:72px;color:var(--color-tone-3)">H1</div>
            <div class="type-meta">68px / 700 / 72px</div>
          </div>
          <div class="type-row">
            <div class="type-sample" style="font-size:42px;font-weight:700;line-height:46px;color:var(--color-tone-3)">H2</div>
            <div class="type-meta">42px / 700 / 46px</div>
          </div>
          <div class="type-row">
            <div class="type-sample" style="font-size:28px;font-weight:700;line-height:32px;color:var(--color-tone-3)">H3</div>
            <div class="type-meta">28px / 700 / 32px</div>
          </div>
          <div class="type-row">
            <div class="type-sample" style="font-size:20px;font-weight:500;line-height:28px;color:var(--color-tone-2)">Body</div>
            <div class="type-meta">20px / 500 / 28px</div>
          </div>
        </div>

        <div>
          <div class="type-col-label">&lt; 810px</div>
          <div class="type-row">
            <div class="type-sample" style="font-size:52px;font-weight:700;line-height:56px;color:var(--color-tone-3)">H1</div>
            <div class="type-meta">52px / 700 / 56px</div>
          </div>
          <div class="type-row">
            <div class="type-sample" style="font-size:34px;font-weight:700;line-height:38px;color:var(--color-tone-3)">H2</div>
            <div class="type-meta">34px / 700 / 38px</div>
          </div>
          <div class="type-row">
            <div class="type-sample" style="font-size:24px;font-weight:700;line-height:28px;color:var(--color-tone-3)">H3</div>
            <div class="type-meta">24px / 700 / 28px</div>
          </div>
          <div class="type-row">
            <div class="type-sample" style="font-size:18px;font-weight:500;line-height:26px;color:var(--color-tone-2)">Body</div>
            <div class="type-meta">18px / 500 / 26px</div>
          </div>
        </div>

      </div>
    </div>

    <!-- Buttons -->
    <div class="section">
      <h3 class="section-title">Buttons</h3>
      <div class="btn-grid">
        <button class="btn btn--lg">Large</button>
        <button class="btn btn--lg">
          <hg-icon name="plus-sign-circle" size="24"></hg-icon>
          Large
        </button>
        <button class="btn btn--md">Medium</button>
        <button class="btn btn--md">
          <hg-icon name="plus-sign-circle" size="24"></hg-icon>
          Medium
        </button>
        <button class="btn btn--sm">Small</button>
        <button class="btn btn--sm">
          <hg-icon name="plus-sign-circle" size="20"></hg-icon>
          Small
        </button>
      </div>
    </div>

  </div>

  <script src="grid-overlay.js"></script>
  <script>
    (function () {
      const nav = document.getElementById('nav');
      const toggle = document.getElementById('nav-toggle');
      function closeMenu() {
        nav.classList.remove('is-open');
      }
      toggle.addEventListener('click', function () {
        nav.classList.toggle('is-open');
      });
      window.addEventListener('resize', function () {
        if (window.innerWidth >= 810) closeMenu();
      });
    })();
  </script>
  <script>
    (function () {
      const COPY = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="8" height="4" x="8" y="2" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>`;
      const CHECK = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>`;

      function isLight(hex) {
        var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return (r*299 + g*587 + b*114) / 1000 > 128;
      }

      // Copy buttons on swatches
      document.querySelectorAll('.swatch[data-color]').forEach(function (swatch, i) {
        swatch.style.setProperty('--stagger-i', i);
        var btn = document.createElement('button');
        btn.className = 'swatch-copy-btn';
        btn.style.color = isLight(swatch.dataset.color) ? '#1a0a40' : '#fff';
        btn.innerHTML = COPY;
        btn.addEventListener('click', function () {
          navigator.clipboard.writeText(swatch.dataset.color);
          showToast(swatch.dataset.color);
          btn.innerHTML = CHECK;
          setTimeout(function () { btn.innerHTML = COPY; }, 1500);
        });
        swatch.querySelector('.swatch-color').appendChild(btn);
      });

      // Toast
      var toast = document.createElement('div');
      toast.id = 'color-toast';
      document.body.appendChild(toast);
      var toastTimer;

      function showToast(hex) {
        toast.innerHTML = '<div class="toast-dot" style="background:' + hex + '"></div><span>Copied ' + hex + '</span>';
        toast.classList.add('is-visible');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { toast.classList.remove('is-visible'); }, 2000);
      }

      // Scroll animations
      document.querySelectorAll('.type-grid > div').forEach(function (el, i) { el.style.setProperty('--stagger-i', i); });
      document.querySelectorAll('.color-swatches .swatch').forEach(function (el, i) { el.style.setProperty('--stagger-i', i); });
      document.querySelectorAll('.btn-grid .btn').forEach(function (el, i) { el.style.setProperty('--stagger-i', i); });

      var els = Array.from(document.querySelectorAll(
        '.page-header, .section-title, .color-swatches .swatch, .type-grid > div, .btn-grid .btn'
      ));
      els.forEach(function (el) { el.classList.add('pg-anim'); });

      var obs = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('is-visible'); obs.unobserve(e.target); }
        });
      }, { threshold: 0.05 });

      requestAnimationFrame(function () {
        els.forEach(function (el) {
          if (el.getBoundingClientRect().bottom <= 0) { el.classList.add('is-visible'); }
          else { obs.observe(el); }
        });
      });
    })();
  </script>
</body>
</html>
