<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klasserom — UngSex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800&display=swap">
  <link rel="stylesheet" href="style.css">
  <script type="module" src="icons.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { overflow: hidden; height: 100dvh; }

    .ks {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
    }

    .ks .hero-mesh { position: absolute; inset: 0; }

    /* Floating icons */
    @keyframes ksFadeUp {
      from { opacity: 0; translate: 0 20px; }
      to   { opacity: 1; translate: 0 0; }
    }

    .ks__icon {
      position: fixed;
      width: 156px;
      height: 156px;
      object-fit: contain;
      pointer-events: none;
      z-index: 1;
      animation: ksFadeUp .6s cubic-bezier(.25,.46,.45,.94) 300ms both,
                 heroFloat 4s ease-in-out 900ms infinite;
    }
    .ks__icon:nth-of-type(1) { animation-duration: .6s, 5s;   animation-delay: 300ms, 0ms;     top: 6%;     left: 4%; }
    .ks__icon:nth-of-type(2) { animation-duration: .6s, 4s;   animation-delay: 300ms, -800ms;  top: 8%;     right: 4%; }
    .ks__icon:nth-of-type(3) { animation-duration: .6s, 6s;   animation-delay: 300ms, -400ms;  bottom: 8%;  left: 3%; }
    .ks__icon:nth-of-type(4) { animation-duration: .6s, 3.5s; animation-delay: 300ms, -1200ms; bottom: 6%;  right: 4%; }

    /* Top chrome */
    .ks__top {
      position: fixed;
      top: 24px;
      left: 24px;
      right: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 3;
    }

    .ks__players {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 48px;
      padding-inline: 16px;
      background: rgba(0,0,0,.4);
      border-radius: 24px;
      font-size: 20px;
      font-weight: 500;
      color: #fff;
    }
    .ks__players hg-icon { color: #fff; }

    .ks__next {
      height: 44px;
      padding-inline: 24px;
      background: var(--color-primary);
      border: none;
      border-radius: 20px;
      position: relative;
      top: -2px;
      box-shadow: 0 4px 0 #5C24B3;
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transform: translateY(0);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
      -webkit-user-select: none;
      user-select: none;
    }
    .ks__next:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #5C24B3;
    }

    /* Center content */
    .ks__content {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 64px;
      pointer-events: none;
    }
    .ks__content > * { pointer-events: auto; }

    .ks__header,
    .ks__join {
      opacity: 0;
      transition: opacity .6s cubic-bezier(.25,.46,.45,.94);
    }
    .ks--loaded .ks__header,
    .ks--loaded .ks__join {
      opacity: 1;
    }

    .ks__header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .ks__logo {
      font-size: var(--font-h2);
      line-height: var(--lh-h2);
      font-weight: 700;
      color: var(--color-tone-3);
    }

    .ks__title {
      font-size: var(--font-h1);
      line-height: var(--lh-h1);
      font-weight: 800;
      color: var(--color-tone-3);
    }

    .ks__waiting {
      margin-top: 48px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-tone-3);
    }

    .loader-dots {
      display: flex;
      gap: 6px;
      margin-top: 16px;
    }
    .loader-dots .dot {
      width: 10px;
      height: 10px;
      background-color: var(--color-tone-3);
      border-radius: 50%;
      animation: ldpulse 1.4s infinite cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    .loader-dots .dot:nth-child(1) { animation-delay: -0.32s; }
    .loader-dots .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes ldpulse {
      0%, 100% { transform: scale(0.3); opacity: 0.3; }
      50%       { transform: scale(1);   opacity: 1; }
    }

    /* Join section */
    .ks__join {
      width: clamp(762px, calc(100vw - 48px), 960px);
      display: flex;
      gap: 16px;
      align-items: stretch;
    }

    .ks__join-left {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Shared glass surface */
    .ks__url,
    .ks__pin,
    .ks__qr {
      background: rgba(255,255,255,.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 0.5px solid rgba(0,0,0,.12);
      box-shadow: 0 8px 8px -4px rgba(0,0,0,.06);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-tone-3);
    }

    .ks__url strong { font-weight: 800; }
    .ks__url {
      height: 64px;
      padding-inline: 32px;
      font-size: 28px;
      font-weight: 500;
      white-space: nowrap;
    }

    .ks__pin {
      height: 196px;
      padding-inline: 32px;
      font-size: 96px;
      font-weight: 800;
      letter-spacing: 0.18em;
    }

    .ks__qr {
      width: 272px;
      height: 272px;
      flex-shrink: 0;
      align-self: flex-end;
      padding: 20px;
    }

    .ks__qr svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div class="ks">
    <div class="hero-mesh" aria-hidden="true">
      <div class="hero-mesh__blurred">
        <div class="hero-mesh__spin">
          <div class="hero-mesh__blob hero-mesh__blob--1"></div>
          <div class="hero-mesh__blob hero-mesh__blob--2"></div>
        </div>
      </div>
    </div>
  </div>

  <img class="ks__icon" src="assets/floating_icons/heart-10730221.svg" alt="" />
  <img class="ks__icon" src="assets/floating_icons/love-birds-10730212.svg" alt="" />
  <img class="ks__icon" src="assets/floating_icons/broken-heart-10730226.svg" alt="" />
  <img class="ks__icon" src="assets/floating_icons/catch-love-10730254.svg" alt="" />

  <div class="ks__top">
    <div class="ks__players">
      <hg-icon name="user-multiple-02" size="20"></hg-icon>
      <span>0</span>
    </div>
    <button class="ks__next">Neste</button>
  </div>

  <div class="ks__content">
    <div class="ks__header">
      <span class="ks__logo">UngSex</span>
      <span class="ks__title">Snakk om sex</span>
      <span class="ks__waiting">Venter på spillere</span>
      <div class="loader-dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>
    <div class="ks__join">
      <div class="ks__join-left">
        <div class="ks__url">ungsex.no/<strong>snakk</strong></div>
        <div class="ks__pin">1&nbsp;2&nbsp;3&nbsp;4</div>
      </div>
        <div class="ks__qr">
          <!-- Placeholder QR -->
          <svg viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Top-left finder -->
            <rect x="1" y="1" width="7" height="7" fill="#1a0a40"/>
            <rect x="2" y="2" width="5" height="5" fill="white"/>
            <rect x="3" y="3" width="3" height="3" fill="#1a0a40"/>
            <!-- Top-right finder -->
            <rect x="13" y="1" width="7" height="7" fill="#1a0a40"/>
            <rect x="14" y="2" width="5" height="5" fill="white"/>
            <rect x="15" y="3" width="3" height="3" fill="#1a0a40"/>
            <!-- Bottom-left finder -->
            <rect x="1" y="13" width="7" height="7" fill="#1a0a40"/>
            <rect x="2" y="14" width="5" height="5" fill="white"/>
            <rect x="3" y="15" width="3" height="3" fill="#1a0a40"/>
            <!-- Data dots -->
            <rect x="9" y="1" width="1" height="1" fill="#1a0a40"/>
            <rect x="11" y="1" width="1" height="1" fill="#1a0a40"/>
            <rect x="9" y="3" width="2" height="1" fill="#1a0a40"/>
            <rect x="10" y="5" width="1" height="2" fill="#1a0a40"/>
            <rect x="9" y="7" width="2" height="1" fill="#1a0a40"/>
            <rect x="11" y="6" width="1" height="1" fill="#1a0a40"/>
            <rect x="9" y="9" width="1" height="1" fill="#1a0a40"/>
            <rect x="11" y="9" width="1" height="1" fill="#1a0a40"/>
            <rect x="13" y="9" width="2" height="1" fill="#1a0a40"/>
            <rect x="10" y="11" width="1" height="1" fill="#1a0a40"/>
            <rect x="12" y="11" width="2" height="1" fill="#1a0a40"/>
            <rect x="9" y="13" width="1" height="2" fill="#1a0a40"/>
            <rect x="11" y="13" width="1" height="1" fill="#1a0a40"/>
            <rect x="13" y="13" width="2" height="1" fill="#1a0a40"/>
            <rect x="16" y="13" width="1" height="1" fill="#1a0a40"/>
            <rect x="11" y="15" width="2" height="1" fill="#1a0a40"/>
            <rect x="15" y="15" width="1" height="2" fill="#1a0a40"/>
            <rect x="9" y="17" width="2" height="1" fill="#1a0a40"/>
            <rect x="13" y="17" width="2" height="1" fill="#1a0a40"/>
            <rect x="17" y="9" width="1" height="1" fill="#1a0a40"/>
            <rect x="19" y="9" width="1" height="1" fill="#1a0a40"/>
            <rect x="17" y="11" width="2" height="1" fill="#1a0a40"/>
            <rect x="19" y="13" width="1" height="1" fill="#1a0a40"/>
            <rect x="17" y="15" width="1" height="1" fill="#1a0a40"/>
            <rect x="19" y="17" width="1" height="1" fill="#1a0a40"/>
            <rect x="17" y="19" width="2" height="1" fill="#1a0a40"/>
          </svg>
      </div>
    </div>
  </div>

  <script>
    requestAnimationFrame(function () {
      document.querySelector('.ks__content').classList.add('ks--loaded');
    });
  </script>
</body>
</html>
