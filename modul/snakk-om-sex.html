      .answer-tile--text-lg,

      .question-answers { gap: 8px; padding-bottom: 16px; }
      .img-right { gap: 8px; }
    }
  </style>
</head>

  <script>
    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(function(s) {
        s.classList.toggle('screen--active', s.dataset.screen === name);
      });
      document.body.classList.toggle('show-intro', name === 'intro');
      document.body.classList.toggle('show-question', name === 'question');
      document.body.classList.toggle('show-question-tf', name === 'question-tf');
      document.body.classList.toggle('show-question-img', name === 'question-img');
      document.querySelectorAll('.question-layout, .img-layout').forEach(function(l) { l.classList.remove('question--revealed'); });
      if (name === 'question' || name === 'question-tf') {
        document.querySelectorAll('[data-screen="' + name + '"] .answer-tile').forEach(function(tile) {
          var len = tile.textContent.trim().length;
          tile.classList.remove('answer-tile--text-lg', 'answer-tile--text-md', 'answer-tile--text-sm');
          tile.classList.add(len <= 20 ? 'answer-tile--text-lg' : len <= 50 ? 'answer-tile--text-md' : 'answer-tile--text-sm');
        });
      }
      if (name === 'question-img') {
        buildImgGrid();
        document.querySelectorAll('[data-screen="question-img"] .answer-tile').forEach(function(tile) {
          var len = tile.textContent.trim().length;
          tile.classList.remove('answer-tile--text-lg', 'answer-tile--text-md', 'answer-tile--text-sm');
          tile.classList.add(len <= 20 ? 'answer-tile--text-lg' : len <= 50 ? 'answer-tile--text-md' : 'answer-tile--text-sm');
        });
      }
      if (name === 'question' || name === 'question-tf' || name === 'question-img') {
        if (window._presentingTimer) clearTimeout(window._presentingTimer);
        var presentingScreen = document.querySelector('[data-screen="' + name + '"]');
        presentingScreen.classList.add('presenting');

        // Fade/scale in the question text
        var h1 = presentingScreen.querySelector('.question-text h1');
        if (h1) {
          h1.style.animation = 'none';
          void h1.offsetHeight;
          h1.style.animation = 'questionIn 0.7s cubic-bezier(0.34, 1.3, 0.64, 1) both';
        }

        // For image screen on desktop: center the image via translate, then animate it left
        var imgWrap = presentingScreen.querySelector('.img-reveal-wrap');
        if (imgWrap && window.innerWidth >= 811) {
          var imgLeft = presentingScreen.querySelector('.img-left');
          var rect = imgLeft.getBoundingClientRect();
          var offset = Math.round(window.innerWidth / 2 - (rect.left + rect.width / 2));
          imgWrap.style.translate = offset + 'px 0';
          imgWrap.style.animation = 'none';
          void imgWrap.offsetHeight;
          imgWrap.style.animation = 'questionIn 0.7s cubic-bezier(0.34, 1.3, 0.64, 1) both';
        }

        var idx = name === 'question' ? 1 : name === 'question-tf' ? 2 : 3;
        var countEl = document.getElementById('q-answers-count-' + idx);
        if (countEl) countEl.textContent = '0';

        window._presentingTimer = setTimeout(function() {
          // Freeze tiles, top bar and img hint hidden so they don't snap visible when presenting is removed
          var tiles = presentingScreen.querySelectorAll('.answer-tile');
          var topBar = presentingScreen.querySelector('.question-top, .img-top');
          var imgHint = presentingScreen.querySelector('.img-hint');
          var isImgScreen = (name === 'question-img');
          var isImgDesktop = isImgScreen && window.innerWidth >= 811;
          tiles.forEach(function(tile) {
            tile.style.opacity = '0';
            tile.style.translate = isImgDesktop ? '120px 0' : '0 28px';
          });
          if (topBar) { topBar.style.opacity = '0'; topBar.style.pointerEvents = 'none'; }
          if (imgHint) { imgHint.style.opacity = '0'; }
          // Remove presenting so question moves up (max-height / max-width transition fires)
          presentingScreen.classList.remove('presenting');
          // Wait for move-up to finish (1.8s) + 0.2s gap, then stagger tiles in
          setTimeout(function() {
            // Move image to final position (CSS transition fires now presenting is removed)
            if (imgWrap && window.innerWidth >= 811) {
              imgWrap.style.translate = '0 0';
            }
            tiles.forEach(function(tile, i) {
              if (isImgDesktop) {
                tile.style.animation = 'tileInRight 1.9s cubic-bezier(0.16, 1, 0.3, 1) ' + (400 + i * 40) + 'ms both';
              } else {
                tile.style.animation = 'tileIn 0.6s cubic-bezier(0.34, 1.3, 0.64, 1) ' + (60 + i * 110) + 'ms both';
              }
            });
            // Fade top bar (and photo credit) in when last tile starts animating
            if (tiles.length > 0) {
              var lastTileStart = 60 + (tiles.length - 1) * 110;
              setTimeout(function() {
                if (topBar) { topBar.style.opacity = '1'; topBar.style.pointerEvents = ''; }
                if (imgHint) { imgHint.style.opacity = '1'; }
              }, lastTileStart);
            }
            var tileAnimEnd = isImgDesktop
              ? (tiles.length - 1) * 40 + 1900
              : 60 + tiles.length * 110 + 600;
            // Clear animation and inline styles so hover/active transitions work normally after
            setTimeout(function() {
              tiles.forEach(function(tile) { tile.style.animation = ''; tile.style.opacity = ''; tile.style.translate = ''; });
              if (topBar) { topBar.style.opacity = ''; }
              if (imgHint) { imgHint.style.opacity = ''; }
              if (imgWrap) { imgWrap.style.translate = ''; imgWrap.style.animation = ''; }
            }, tileAnimEnd);
            // Start counter only after all tile animations are done
            if (countEl) {
              setTimeout(function() {
                var total = 21;
                var duration = 5000;
                var start = performance.now();
                (function tick(now) {
                  var elapsed = now - start;
                  var progress = Math.min(elapsed / duration, 1);
                  var eased = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
                  countEl.textContent = Math.round(eased * total);
                  if (progress < 1) requestAnimationFrame(tick);
                })(start);
              }, tileAnimEnd + 1000);
            }
          }, 800);
        }, 3500);
      }
      if (name === 'intro') {
        var introScreen = document.querySelector('[data-screen="intro"]');
        var introVideo = introScreen.querySelector('.intro-video');
        var introTop = introScreen.querySelector('.intro-top');
        if (introVideo) {
          introVideo.style.animation = 'none';
          void introVideo.offsetHeight;
          introVideo.style.animation = 'questionIn 0.7s cubic-bezier(0.34, 1.3, 0.64, 1) both';
        }
        if (introTop) {
          introTop.style.opacity = '0';
          introTop.style.animation = 'none';
          void introTop.offsetHeight;
          introTop.style.animation = 'tileIn 0.5s cubic-bezier(0.34, 1.3, 0.64, 1) 300ms both';
        }
      }
      if (name === 'pin') {
        document.querySelector('.ks__content').classList.add('ks--loaded');
        var pinScreen = document.querySelector('[data-screen="pin"]');
        var pinTop = pinScreen.querySelector('.ks__top');
        var pinAnimEls = [
          pinScreen.querySelector('.ks__logo'),
          pinScreen.querySelector('.ks__title'),
          pinScreen.querySelector('.ks__waiting'),
          pinScreen.querySelector('.loader-dots'),
          pinScreen.querySelector('.ks__join'),
        ];
        pinAnimEls.forEach(function(el, i) {
          if (!el) return;
          el.style.animation = 'none';
          void el.offsetHeight;
          el.style.animation = 'tileIn 0.6s cubic-bezier(0.34, 1.3, 0.64, 1) ' + (i * 80) + 'ms both';
        });
        if (pinTop) {
          pinTop.style.animation = 'none';
          void pinTop.offsetHeight;
          pinTop.style.animation = 'tileIn 0.5s cubic-bezier(0.34, 1.3, 0.64, 1) 400ms both';
        }
        var pinCount = document.getElementById('pin-count');
        if (pinCount) {
          pinCount.textContent = '0';
          setTimeout(function() {
            var start = performance.now();
            var duration = 5000;
            var total = 21;
            (function tick(now) {
              var elapsed = now - start;
              var progress = Math.min(elapsed / duration, 1);
              var eased = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
              pinCount.textContent = Math.round(eased * total);
              if (progress < 1) requestAnimationFrame(tick);
            })(start);
          }, 2000);
        }
      }
      // Move focus to first focusable element on the new screen (keyboard only)
      if (usingKeyboard) {
        var screen = document.querySelector('[data-screen="' + name + '"]');
        if (screen) {
          var focusable = screen.querySelector('a[href], button:not([disabled]), [tabindex="0"]');
          if (focusable) focusable.focus();
        }
      }
    }

    var cells = [];

    function buildImgGrid() {
      var grid = document.getElementById('img-grid');
      grid.innerHTML = '';
      var total = 64, batchSize = Math.round(total * 0.1);

      // build all cells covered, shuffle order for random reveals
      cells = [];
      for (var i = 0; i < total; i++) {
        var cell = document.createElement('div');
        cell.className = 'img-cell';
        grid.appendChild(cell);
        cells.push(cell);
      }
      for (var i = cells.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = cells[i]; cells[i] = cells[j]; cells[j] = tmp;
      }

      // reveal first 10% immediately
      cells.splice(0, batchSize).forEach(function(c) { c.classList.add('revealed'); });

      // attach click to img-left: reveal next 10% each click
      var imgLeft = document.querySelector('[data-screen="question-img"] .img-left');
      imgLeft.style.setProperty('--img-left-h', imgLeft.offsetHeight + 'px');
      var imgWrap = document.querySelector('[data-screen="question-img"] .img-reveal-wrap');
      var imgHintEl = imgLeft.querySelector('.img-hint');
      function positionHint() {
        if (imgHintEl) {
          imgLeft.style.setProperty('--img-left-h', imgLeft.offsetHeight + 'px');
          imgHintEl.style.top = (imgWrap.offsetTop + imgWrap.offsetHeight + 16) + 'px';
        }
      }
      positionHint();
      window.addEventListener('resize', positionHint);
      function doReveal() {
        if (!cells.length) return;
        cells.splice(0, batchSize).forEach(function(c) { c.classList.add('revealed'); });
      }
      imgWrap.onclick = doReveal;
      imgWrap.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doReveal(); }
      });
    }

    function revealAnswer() {
      document.querySelector('[data-screen="question"] .question-layout').classList.add('question--revealed');
    }

    function revealTf() {
      document.querySelector('[data-screen="question-tf"] .question-layout').classList.add('question--revealed');
    }

    function revealImg() {
      document.querySelector('[data-screen="question-img"] .img-layout').classList.add('question--revealed');
    }

    function revealImgAll() {
      cells.splice(0).forEach(function(c) { c.classList.add('revealed'); });
      revealImg();
    }

    showScreen('modul');

    (function() {
      var btn = document.getElementById('fullscreen-btn');
      function updateIcon() {
        var isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        btn.innerHTML = isFs
          ? '<hg-icon name="arrow-shrink-02" size="24"></hg-icon>'
          : '<hg-icon name="arrow-expand-01" size="24"></hg-icon>';
        btn.setAttribute('aria-label', isFs ? 'Avslutt fullskjerm' : 'Fullskjerm');
      }
      btn.addEventListener('click', function() {
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          (document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen).call(document.documentElement);
        } else {
          (document.exitFullscreen || document.webkitExitFullscreen).call(document);
        }
      });
      document.addEventListener('fullscreenchange', updateIcon);
      document.addEventListener('webkitfullscreenchange', updateIcon);
    })();

    // Track keyboard vs mouse navigation
    var usingKeyboard = false;
    document.addEventListener('keydown', function(e) { if (e.key === 'Tab') usingKeyboard = true; });
    document.addEventListener('mousedown', function() { usingKeyboard = false; });
    document.addEventListener('pointerdown', function() { usingKeyboard = false; });

    // Focus loop — wraps Tab from last focusable back to first
    (function () {
      var FOCUSABLE = 'a[href], button:not([disabled]), [tabindex]:not([tabindex="-1"])';
      document.addEventListener('keydown', function (e) {
        if (e.key !== 'Tab') return;
        var focusable = Array.from(document.querySelectorAll(FOCUSABLE)).filter(function (el) {
          return el.offsetParent !== null || getComputedStyle(el).position === 'fixed';
        });
        if (focusable.length < 2) return;
        var first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault(); last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault(); first.focus();
        }
      });
    })();
  </script>
